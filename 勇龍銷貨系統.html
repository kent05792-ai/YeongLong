*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Microsoft JhengHei","PingFang TC","Noto Sans CJK TC",sans-serif;font-size:13px;background:#f4f6f9;color:#2d2d2d;min-height:100vh}
#root{display:flex;flex-direction:column;min-height:100vh}
.navbar{background:#1a2744;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.navbar-brand{font-size:16px;font-weight:600;color:#f5d98a;letter-spacing:1px}
.navbar-sub{font-size:11px;color:#8fa8c8;margin-top:2px}
.nav-tabs{display:flex;gap:2px;padding:10px 16px 0;background:#fff;border-bottom:1px solid #dde3ec}
.nav-tab{padding:8px 18px;border-radius:8px 8px 0 0;cursor:pointer;font-size:13px;color:#666;border:1px solid transparent;border-bottom:none;background:transparent;transition:all .15s}
.nav-tab:hover{background:#f0f4f8;color:#333}
.nav-tab.active{background:#fff;color:#1a2744;border-color:#dde3ec;font-weight:500;margin-bottom:-1px}
.content{flex:1;padding:16px 20px;max-width:1200px;margin:0 auto;width:100%}
.card{background:#fff;border:1px solid #dde3ec;border-radius:10px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.card-title{font-size:14px;font-weight:500;color:#1a2744;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #eef1f6}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:6px;border:1px solid #ccd2dc;background:#fff;cursor:pointer;font-size:12px;color:#444;transition:all .15s;font-family:inherit}
.btn:hover{background:#f0f4f8;border-color:#99a8bc}
.btn-primary{background:#1a2744;color:#fff;border-color:#1a2744}
.btn-primary:hover{background:#243660}
.btn-gold{background:#c9a84c;color:#fff;border-color:#c9a84c;font-weight:500}
.btn-gold:hover{background:#b8963e}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-danger{color:#c0392b;border-color:#e8b4b4}
.btn-danger:hover{background:#fdf2f2}
label{font-size:12px;color:#666;display:block;margin-bottom:4px}
input,select,textarea{width:100%;padding:7px 10px;border:1px solid #ccd2dc;border-radius:6px;font-size:12px;background:#fff;color:#2d2d2d;font-family:inherit;transition:border .15s}
input:focus,select:focus{outline:none;border-color:#1a2744;box-shadow:0 0 0 3px rgba(26,39,68,.1)}
.form-grid{display:grid;gap:12px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:1fr 1fr 1fr}
.g4{grid-template-columns:1fr 1fr 1fr 1fr}
table.data{width:100%;border-collapse:collapse;font-size:12px}
table.data th{background:#1a2744;color:#fff;padding:8px 10px;text-align:left;font-weight:500;white-space:nowrap}
table.data td{padding:7px 10px;border-bottom:1px solid #eef1f6;vertical-align:middle}
table.data tr:hover td{background:#f8fafd}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.badge-blue{background:#e6f1fb;color:#0c447c}
.badge-green{background:#eaf3de;color:#3b6d11}
.badge-gold{background:#faeeda;color:#854f0b}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
.stat-card{background:#fff;border:1px solid #dde3ec;border-radius:10px;padding:14px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.stat-val{font-size:22px;font-weight:500;color:#1a2744}
.stat-lbl{font-size:11px;color:#888;margin-top:4px}
.items-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px}
.items-table th{background:#eef2f8;padding:6px 8px;text-align:center;border:1px solid #dde3ec;font-weight:500;font-size:11px}
.items-table td{padding:5px 6px;border:1px solid #eef1f6;text-align:center;vertical-align:middle}
.items-table input,.items-table select{padding:4px 6px;font-size:11px;border-radius:4px}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:#fff;border-radius:12px;padding:24px;width:92%;max-width:760px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.modal-title{font-size:15px;font-weight:500;margin-bottom:16px;color:#1a2744;display:flex;justify-content:space-between;align-items:center;padding-bottom:12px;border-bottom:1px solid #eef1f6}
.empty{text-align:center;color:#999;padding:50px;font-size:14px}
.section-hdr{font-size:12px;font-weight:500;color:#1a2744;margin:12px 0 8px;padding-bottom:5px;border-bottom:1px solid #eef1f6}
.print-hint{font-size:11px;color:#666;background:#f8fafd;padding:8px 12px;border-radius:6px;margin-bottom:10px;border-left:3px solid #c9a84c}
@media print{
  @page{size:25.7cm 36.4cm;margin:0}
  .navbar,.nav-tabs,.btn,.modal-bg{display:none!important}
  .content{padding:0;max-width:100%}
}
@media(max-width:768px){
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .g3,.g4{grid-template-columns:1fr 1fr}
  .g2{grid-template-columns:1fr}

</style>

function exportXLSX(order,cust,showPrices){
  try{
    if(typeof XLSX==='undefined'){alert('XLSX 套件未載入，請確認網路連線後重新整理頁面');return;}
    const wb=XLSX.utils.book_new();
    const c=cust||{};
    const roc=toROC(order.date);const rocM=toROCM(order.date);
    const title=showPrices?'請款單':'銷貨單';
    const items=order.items||[];
    const total=order.total||0;
    const tax=Math.round(total*0.05);

    // 7 columns A-G matching 銷貨單 layout
    // idx: 0=No. 1=產名規格 2=尺寸 3=數量 4=單價 5=金額 6=備註
    const d=[
      [null,null,null,null,null,null,null],                                     // 0 blank
      [COMPANY.name,null,null,null,null,null,null],                             // 1 company name (A:G merged)
      [COMPANY.nameEn,null,null,null,null,null,null],                           // 2 company EN
      [title,null,null,null,null,null,null],                                    // 3 title
      ['客戶名稱：',c.name||'',null,null,'聯絡電話：',c.phone||'',null],        // 4 info row 1
      ['聯絡人：',c.contact||'',null,null,showPrices?'對帳月份：':'銷貨單號：',showPrices?rocM:order.orderNumber,null], // 5
      ['送貨地址：',c.address||'',null,null,'日期：',showPrices?rocM:roc,null], // 6
      ['No.','產名規格','尺寸(CM)','數量','單價','金額','備註'],                 // 7 header
    ];

    // 11 item rows (idx 8-18)
    const MIN_ROWS=11;
    for(let i=0;i<MIN_ROWS;i++){
      const it=items[i];
      if(it){
        d.push([i+1,`${it.product||''} ${it.color||''}`.trim(),
          it.size||null,it.qty||null,
          showPrices?(it.unitPrice||null):null,
          showPrices?(it.amount||null):null,
          null]);
      }else{
        d.push([null,null,null,null,null,null,null]);
      }
    }

    // Footer rows (idx 19-21)
    d.push(['客戶簽章',null,null,'合計',null,showPrices?total:null,null]);       // 19
    d.push([null,null,null,'稅額',null,showPrices?tax:null,null]);               // 20
    d.push([null,null,null,'總計',null,showPrices?(total+tax):null,null]);       // 21
    // Company footer (idx 22-23)
    d.push([`公司地址：${COMPANY.addr}`,null,null,null,null,null,null]);         // 22
    d.push([`電話：${COMPANY.tel}　　Line ID：${COMPANY.line}`,null,null,null,null,null,null]); // 23

    const ws=XLSX.utils.aoa_to_sheet(d);

    const merges=[
      // Company / EN / title span all 7 cols
      {s:{r:1,c:0},e:{r:1,c:6}},
      {s:{r:2,c:0},e:{r:2,c:6}},
      {s:{r:3,c:0},e:{r:3,c:6}},
      // Info rows: value B-D merged, value F-G merged
      {s:{r:4,c:1},e:{r:4,c:3}},{s:{r:4,c:5},e:{r:4,c:6}},
      {s:{r:5,c:1},e:{r:5,c:3}},{s:{r:5,c:5},e:{r:5,c:6}},
      {s:{r:6,c:1},e:{r:6,c:3}},{s:{r:6,c:5},e:{r:6,c:6}},
      // Footer 客戶簽章 A-C rows 19-21
      {s:{r:19,c:0},e:{r:21,c:2}},
      // Footer labels D-E, values F-G
      {s:{r:19,c:3},e:{r:19,c:4}},{s:{r:19,c:5},e:{r:19,c:6}},
      {s:{r:20,c:3},e:{r:20,c:4}},{s:{r:20,c:5},e:{r:20,c:6}},
      {s:{r:21,c:3},e:{r:21,c:4}},{s:{r:21,c:5},e:{r:21,c:6}},
      // Company footer span all cols
      {s:{r:22,c:0},e:{r:22,c:6}},
      {s:{r:23,c:0},e:{r:23,c:6}},
    ];
    ws['!merges']=merges;

    ws['!cols']=[{wch:5},{wch:26},{wch:10},{wch:8},{wch:8},{wch:11},{wch:14}];

    XLSX.utils.book_append_sheet(wb,ws,title);

    const wout=XLSX.write(wb,{bookType:'xlsx',type:'array'});
    const blob=new Blob([wout],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=`${order.orderNumber}_${c.name||'客戶'}_${title}.xlsx`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  }catch(e){
    alert('Excel 匯出失敗：'+e.message);
    console.error('exportXLSX error:',e);
  }
}

/* ===== NEW ORDER MODAL ===== */
function NewOrderModal({customers,prices,products,onSave,onClose}){
  const[cid,setCid]=useState(customers[0]?.id||'');
  const[date,setDate]=useState(today());
  const[items,setItems]=useState([]);
  const[shipping,setShipping]=useState(0);
  const[note,setNote]=useState('');
  const cust=customers.find(c=>c.id===cid)||customers[0];
  const defProd=products[0]?.name||'ㄇ 6*6*6';

  const getPrice=(custName,productName)=>{
    const cat=PCAT[productName];
    if(!cat)return 0;
    return(prices[custName]||STD)[cat]||0;
  };

  const calcAmt=(item)=>{
    if(['運費','L角配件','人工費'].includes(item.product))return item.amount;
    return Math.round(item.size*item.qty*item.unitPrice);
  };

  useEffect(()=>{
    if(cust){
      const up=getPrice(cust.name,defProd);
      const amt=Math.round(160*1*up);
      setItems([{id:uid(),product:defProd,color:'白',size:160,qty:1,unitPrice:up,amount:amt}]);
    }
  },[]);

  const updItem=(idx,field,val)=>{
    setItems(prev=>{
      const arr=[...prev];
      const updated={...arr[idx],[field]:['size','qty','amount','unitPrice'].includes(field)?Number(val)||0:val};
      if(field==='product')updated.unitPrice=getPrice(cust.name,val);
      if(field!=='amount')updated.amount=calcAmt(updated);
      arr[idx]=updated;
      return arr;
    });
  };

  const addItem=()=>{
    const up=getPrice(cust.name,defProd);
    const amt=Math.round(160*1*up);
    setItems(prev=>[...prev,{id:uid(),product:defProd,color:'白',size:160,qty:1,unitPrice:up,amount:amt}]);
  };

  const delItem=idx=>setItems(prev=>prev.filter((_,i)=>i!==idx));

  const handleCust=v=>{
    setCid(v);
    const newCust=customers.find(c=>c.id===v);
    if(newCust)setItems(prev=>prev.map(item=>{
      const up=getPrice(newCust.name,item.product);
      const updated={...item,unitPrice:up};
      return{...updated,amount:calcAmt(updated)};
    }));
  };

  const subtotal=items.reduce((s,i)=>s+i.amount,0);
  const total=subtotal+Number(shipping||0);

  const handleSave=()=>{
    if(!cid||!date)return alert('請選擇客戶和日期');
    if(items.length===0)return alert('請新增至少一個商品');
    const order={id:uid(),customerId:cid,date,orderNumber:getON(date),
      items:items.map((it,i)=>({...it,no:i+1})),
      extras:[],shipping:Number(shipping)||0,total,note};
    onSave(order);
    onClose();
  };

  return(
    <div className="modal-bg">
      <div className="modal">
        <div className="modal-title">
          <span>✦ 新增銷貨單</span>
          <button className="btn btn-sm" onClick={onClose}>✕ 關閉</button>
        </div>
        <div className="form-grid g3" style={{marginBottom:12}}>
          <div><label>客戶名稱</label>
            <select value={cid} onChange={e=>handleCust(e.target.value)}>
              {customers.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
          </div>
          <div><label>日期</label><input type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
          <div><label>銷貨單號（自動產生）</label>
            <input readOnly value={date?getON(date):''} style={{background:'#f8fafd',color:'#1a2744',fontWeight:500}}/>
          </div>
        </div>
        {cust&&cust.phone&&<div style={{fontSize:11,color:'#666',marginBottom:10,background:'#f8fafd',padding:'6px 10px',borderRadius:6}}>
          👤 {cust.contact}　📞 {cust.phone}　📍 {cust.address}
        </div>}

        <div className="section-hdr">商品項目</div>
        <div style={{overflowX:'auto'}}>
          <table className="items-table">
            <thead><tr>
              <th style={{width:30}}>No.</th><th style={{minWidth:120}}>產品</th><th style={{width:55}}>顏色</th>
              <th style={{width:70}}>尺寸(CM)</th><th style={{width:50}}>數量</th>
              <th style={{width:65}}>單價/cm</th><th style={{width:75}}>金額(NT$)</th><th style={{width:35}}></th>
            </tr></thead>
            <tbody>
              {items.map((item,idx)=>{const isSimple=['運費','L角配件','人工費'].includes(item.product);return(
                <tr key={item.id}>
                  <td style={{color:'#999'}}>{idx+1}</td>
                  <td><select value={item.product} onChange={e=>updItem(idx,'product',e.target.value)}>
                    {products.map(p=><option key={p.id}>{p.name}</option>)}
                  </select></td>
                  {isSimple?(
                    <><td colSpan={4} style={{textAlign:'center',color:'#ccc',fontSize:11}}>—</td>
                    <td><input type="number" value={item.amount} onChange={e=>updItem(idx,'amount',e.target.value)}/></td></>
                  ):(
                    <>
                    <td><select value={item.color} onChange={e=>updItem(idx,'color',e.target.value)}>
                      {COLORS.map(c=><option key={c}>{c}</option>)}
                    </select></td>
                    <td><input type="number" value={item.size} min="1" onChange={e=>updItem(idx,'size',e.target.value)}/></td>
                    <td><input type="number" value={item.qty} min="1" onChange={e=>updItem(idx,'qty',e.target.value)}/></td>
                    <td><input type="number" step="0.1" value={item.unitPrice} onChange={e=>updItem(idx,'unitPrice',e.target.value)}/></td>
                    <td><input type="number" value={item.amount} onChange={e=>updItem(idx,'amount',e.target.value)}/></td>

          <button className="btn btn-sm" onClick={addItem}>＋ 新增品項</button>

function PurchaseView({purchases,setPurchases}){
  const[showNew,setShowNew]=useState(false);
  const[editPO,setEditPO]=useState(null);
  const[filterSupplier,setFilterSupplier]=useState('');
  const[filterPayMethod,setFilterPayMethod]=useState('');
  const[filterPaid,setFilterPaid]=useState('');
  const savePO=po=>{const u=[po,...purchases];setPurchases(u);DB.save('yl-purchases',u);setShowNew(false);};
  const updatePO=po=>{const u=purchases.map(p=>p.id===po.id?po:p);setPurchases(u);DB.save('yl-purchases',u);setEditPO(null);};
  const delPO=id=>{if(!confirm('確定刪除此訂購單？'))return;const u=purchases.filter(p=>p.id!==id);setPurchases(u);DB.save('yl-purchases',u);};
  const togglePaid=po=>{const u=purchases.map(p=>p.id===po.id?{...p,paid:!po.paid,paidDate:!po.paid?today():''}:p);setPurchases(u);DB.save('yl-purchases',u);};
  const suppliers=[...new Set(purchases.map(p=>p.supplier))].filter(Boolean);
  const filt=purchases
    .filter(p=>(!filterSupplier||p.supplier===filterSupplier)&&(!filterPayMethod||p.payMethod===filterPayMethod)&&(filterPaid===''||(filterPaid==='paid'?p.paid:!p.paid)))
    .sort((a,b)=>b.date.localeCompare(a.date));
  const totalAmt=purchases.reduce((s,p)=>s+(p.total||0),0);
  const paidAmt=purchases.filter(p=>p.paid).reduce((s,p)=>s+(p.total||0),0);

    <div>

          <div style={{marginLeft:'auto',alignSelf:'flex-end',fontSize:12,color:'#999'}}>共 {filt.length} 筆　合計 NT$ {fmtN(filt.reduce((s,p)=>s+(p.total||0),0))}</div>
        </div>
        {filt.length>0?(

/* ===== MONTHLY REPORT ===== */
function MonthlyReport({orders,customers,costs,purchases}){
  const[month,setMonth]=useState('');
  const months=[...new Set(orders.map(o=>toROCM(o.date)))].sort().reverse();
  const filtered=month?orders.filter(o=>toROCM(o.date)===month):orders;
  const filtPurchases=month?(purchases||[]).filter(p=>toROCM(p.date)===month):(purchases||[]);
  const totalPurchase=filtPurchases.reduce((s,p)=>s+(p.total||0),0);
  const byCustomer={};const bySpec={};
  let totalRev=0,totalCost=0,totalQty=0;
  filtered.forEach(o=>{
    const cn=customers.find(c=>c.id===o.customerId)?.name||'未知';
    if(!byCustomer[cn])byCustomer[cn]={name:cn,orders:0,revenue:0,qty:0};
    byCustomer[cn].orders++;
    (o.items||[]).forEach(item=>{
      byCustomer[cn].revenue+=item.amount;byCustomer[cn].qty+=item.qty;
      const key=`${item.product} ${item.color} ${item.size}cm`;
      if(!bySpec[key])bySpec[key]={spec:key,qty:0,revenue:0,cost:0};
      bySpec[key].qty+=item.qty;bySpec[key].revenue+=item.amount;
      const cat=item.product;
      bySpec[key].cost+=Math.round(item.size*(costs[cat]||0)*item.qty);
      totalRev+=item.amount;totalQty+=item.qty;
      totalCost+=Math.round(item.size*(costs[cat]||0)*item.qty);
    });
    if(o.shipping>0)totalRev+=o.shipping;
  });
  const custRows=Object.values(byCustomer).sort((a,b)=>b.revenue-a.revenue);
  const specRows=Object.values(bySpec).sort((a,b)=>b.qty-a.qty);
  const profit=totalRev-totalCost;
  const netProfit=profit-totalPurchase;
  const margin=totalRev>0?((profit/totalRev)*100).toFixed(1):0;
  const netMargin=totalRev>0?((netProfit/totalRev)*100).toFixed(1):0;
  return(
    <div>
      <div className="card">
        <div className="card-title">月銷售報表</div>
        <div style={{display:'flex',gap:10,marginBottom:14,alignItems:'flex-end'}}>
          <div style={{width:200}}>
            <label>月份（民國）</label>
            <select value={month} onChange={e=>setMonth(e.target.value)}>
              <option value="">— 全部月份（累計）—</option>
              {months.map(m=><option key={m} value={m}>{m}</option>)}
            </select>
          </div>
        </div>
        <div className="stat-grid">
          <div className="stat-card"><div className="stat-val">{totalQty.toLocaleString()}</div><div className="stat-lbl">銷售總數量（條）</div></div>
          <div className="stat-card"><div className="stat-val" style={{color:'#c9a84c',fontSize:18}}>NT$ {fmtN(totalRev)}</div><div className="stat-lbl">銷售總金額</div></div>
          <div className="stat-card"><div className="stat-val" style={{color:'#c0392b',fontSize:18}}>NT$ {fmtN(totalPurchase)}</div><div className="stat-lbl">訂購進貨金額（－）</div></div>
          <div className="stat-card"><div className="stat-val" style={{color:'#27ae60',fontSize:18}}>NT$ {fmtN(netProfit)}</div><div className="stat-lbl">淨利（{netMargin}%）</div></div>
        </div>
        <div style={{background:'#f8f9fa',borderRadius:6,padding:'8px 14px',marginBottom:12,fontSize:13,color:'#555',display:'flex',gap:24,flexWrap:'wrap'}}>
          <span>估算成本（依成本價）：<strong>NT$ {fmtN(totalCost)}</strong></span>
          <span>毛利：<strong style={{color:'#27ae60'}}>NT$ {fmtN(profit)}（{margin}%）</strong></span>
          <span>訂購進貨扣除：<strong style={{color:'#c0392b'}}>－ NT$ {fmtN(totalPurchase)}</strong></span>
          <span>淨利：<strong style={{color:netProfit>=0?'#27ae60':'#c0392b'}}>NT$ {fmtN(netProfit)}（{netMargin}%）</strong></span>
        </div>
        <div className="section-hdr">各客戶銷售統計</div>
        {custRows.length>0?(
          <table className="data" style={{marginBottom:14}}>
            <thead><tr><th>客戶名稱</th><th>訂單數</th><th>數量（條）</th><th>銷售金額（NT$）</th></tr></thead>
            <tbody>{custRows.map(r=>(
              <tr key={r.name}>
                <td><span className="badge badge-blue">{r.name}</span></td>
                <td style={{textAlign:'center'}}>{r.orders}</td>
                <td style={{textAlign:'center'}}>{r.qty}</td>
                <td style={{fontWeight:500,color:'#c9a84c',textAlign:'right'}}>{fmtN(r.revenue)}</td>
              </tr>
            ))}</tbody>
          </table>
        ):<div className="empty">無銷售資料</div>}
        <div className="section-hdr">各規格銷售統計</div>
        {specRows.length>0?(
          <table className="data">
            <thead><tr><th>規格</th><th>數量（條）</th><th>銷售金額</th><th>估算成本</th><th>毛利</th></tr></thead>
            <tbody>{specRows.map(r=>(
              <tr key={r.spec}>
                <td>{r.spec}</td>
                <td style={{textAlign:'center'}}>{r.qty}</td>
                <td style={{fontWeight:500,color:'#c9a84c',textAlign:'right'}}>{fmtN(r.revenue)}</td>
                <td style={{color:'#c0392b',textAlign:'right'}}>{fmtN(r.cost)}</td>
                <td style={{color:'#27ae60',fontWeight:500,textAlign:'right'}}>{fmtN(r.revenue-r.cost)}</td>
              </tr>
            ))}</tbody>
          </table>
        ):<div className="empty">無銷售資料</div>}
        <div style={{marginTop:10,fontSize:11,color:'#888',background:'#f8fafd',padding:'6px 10px',borderRadius:6}}>
          ⚠️ 成本依「設定→成本價格」估算：{Object.entries(costs).map(([k,v])=>`${k}=${v}`).join('、')}
        </div>
      </div>
    </div>
  );
}

/* ===== RECEIVABLES ===== */
function ReceivablesView({orders,customers,receivables,setReceivables}){
  const[filterMonth,setFilterMonth]=useState('');
  const[filterStatus,setFilterStatus]=useState('');
  const months=[...new Set(orders.map(o=>toROCM(o.date)))].sort().reverse();

  const byKey={};
  orders.forEach(o=>{
    const month=toROCM(o.date);
    const key=`${o.customerId}-${month}`;
    if(!byKey[key])byKey[key]={customerId:o.customerId,month,total:0};
    byKey[key].total+=(o.total||0);
  });

  const rows=Object.values(byKey)
    .filter(r=>(!filterMonth||r.month===filterMonth))
    .sort((a,b)=>b.month.localeCompare(a.month)||a.customerId.localeCompare(b.customerId));

  const filtRows=filterStatus==='paid'?rows.filter(r=>receivables[`${r.customerId}-${r.month}`]?.paid)
    :filterStatus==='unpaid'?rows.filter(r=>!receivables[`${r.customerId}-${r.month}`]?.paid)
    :rows;

  const totalAmt=rows.reduce((s,r)=>s+r.total,0);
  const actualAmt=rows.reduce((s,r)=>s+(Number(receivables[`${r.customerId}-${r.month}`]?.actualAmt)||0),0);
  const discountAmt=rows.reduce((s,r)=>s+(Number(receivables[`${r.customerId}-${r.month}`]?.discount)||0),0);
  const unpaidAmt=rows.filter(r=>!receivables[`${r.customerId}-${r.month}`]?.paid).reduce((s,r)=>s+r.total,0);

  const updRec=(key,field,val)=>{
    const u={...receivables,[key]:{...(receivables[key]||{}),[field]:val}};
    setReceivables(u);DB.save('yl-receivables',u);
  };
  const markPaid=(key,paid)=>{
    const u={...receivables,[key]:{...(receivables[key]||{}),paid,paidDate:paid?today():''}};
    setReceivables(u);DB.save('yl-receivables',u);
  };

  return(
    <div>
      <div className="stat-grid">
        <div className="stat-card"><div className="stat-val" style={{fontSize:17}}>NT$ {fmtN(totalAmt)}</div><div className="stat-lbl">總應收金額</div></div>
        <div className="stat-card"><div className="stat-val" style={{fontSize:17,color:'#3b6d11'}}>NT$ {fmtN(actualAmt)}</div><div className="stat-lbl">實收合計</div></div>
        <div className="stat-card"><div className="stat-val" style={{fontSize:17,color:'#854f0b'}}>NT$ {fmtN(discountAmt)}</div><div className="stat-lbl">折讓合計</div></div>
        <div className="stat-card"><div className="stat-val" style={{fontSize:17,color:'#c0392b'}}>NT$ {fmtN(unpaidAmt)}</div><div className="stat-lbl">未收款合計</div></div>
      </div>
      <div className="card">
        <div style={{display:'flex',gap:10,marginBottom:12,flexWrap:'wrap',alignItems:'flex-end'}}>
          <div><label>篩選月份</label>
            <select value={filterMonth} onChange={e=>setFilterMonth(e.target.value)} style={{width:120}}>
              <option value="">全部月份</option>
              {months.map(m=><option key={m} value={m}>{m}</option>)}
            </select>
          </div>
          <div><label>收款狀態</label>
            <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={{width:110}}>
              <option value="">全部</option>
              <option value="unpaid">未收款</option>
              <option value="paid">已收款</option>
            </select>
          </div>
          <div style={{marginLeft:'auto',fontSize:12,color:'#999',alignSelf:'flex-end'}}>共 {filtRows.length} 筆</div>
        </div>
        <div style={{overflowX:'auto'}}>
          <table className="data">
            <thead><tr>
              <th>月份</th><th>客戶名稱</th><th style={{textAlign:'right'}}>應收金額（NT$）</th>
              <th style={{textAlign:'center'}}>實收金額</th><th style={{textAlign:'center'}}>折讓</th>
              <th style={{textAlign:'center'}}>收款方式</th><th style={{textAlign:'center'}}>狀態</th>
              <th style={{textAlign:'center'}}>收款日期</th><th>操作</th>
            </tr></thead>
            <tbody>
              {filtRows.length===0&&<tr><td colSpan={9} style={{textAlign:'center',color:'#999',padding:30}}>尚無資料</td></tr>}
              {filtRows.map(r=>{
                const key=`${r.customerId}-${r.month}`;
                const rec=receivables[key]||{};
                const cust=customers.find(c=>c.id===r.customerId);
                return(
                  <tr key={key} style={{background:rec.paid?'#f4fbf0':''}}>
                    <td style={{whiteSpace:'nowrap'}}>{r.month}</td>
                    <td style={{fontWeight:500}}>{cust?.name||'—'}</td>
                    <td style={{textAlign:'right',fontWeight:500,color:rec.paid?'#3b6d11':'#c0392b'}}>
                      NT$ {fmtN(r.total)}
                    </td>
                    <td style={{textAlign:'center'}}>
                      <input type="number" style={{width:90,textAlign:'right'}} placeholder="0"
                        value={rec.actualAmt||''} onChange={e=>{
                          const actual=Number(e.target.value)||0;
                          const disc=r.total-actual;
                          const u={...receivables,[key]:{...(rec),actualAmt:e.target.value,discount:disc>0?disc:0}};
                          setReceivables(u);DB.save('yl-receivables',u);
                        }}/>
                    </td>
                    <td style={{textAlign:'center'}}>
                      <input type="number" style={{width:80,textAlign:'right'}} placeholder="0"
                        value={rec.discount||''} onChange={e=>updRec(key,'discount',e.target.value)}/>
                    </td>
                    <td style={{textAlign:'center'}}>
                      <select value={rec.payMethod||''} onChange={e=>updRec(key,'payMethod',e.target.value)} style={{width:72,textAlign:'center',fontSize:12}}>
                        <option value="">—</option>
                        <option value="cash">現金</option>
                        <option value="transfer">轉帳</option>
                      </select>
                    </td>
                    <td style={{textAlign:'center'}}>
                      <span className={`badge ${rec.paid?'badge-green':'badge-gold'}`}>{rec.paid?'已收款':'未收款'}</span>
                    </td>
                    <td style={{textAlign:'center',fontSize:12,color:'#666'}}>{rec.paidDate||'—'}</td>
                    <td>
                      {rec.paid
                        ?<button className="btn btn-sm" onClick={()=>markPaid(key,false)}>撤銷</button>
                        :<button className="btn btn-sm btn-primary" onClick={()=>markPaid(key,true)}>標記已收</button>}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

    if(!newC.name.trim())return alert('請輸入客戶名稱');
    const c={...newC,id:'c'+Date.now()};
    const uc=[...customers,c];setCustomers(uc);DB.save('yl-customers-v4',uc);

      delete up[old.name];setPrices(up);DB.save('yl-prices-v2',up);

  };

  return(
    <div>
      <div style={{display:'flex',gap:6,marginBottom:14}}>
        {[['customers','👥 客戶管理'],['products','🏷️ 產品管理'],['prices','💲 門檻價格'],['password','🔒 密碼設定']].map(([k,l])=>(
          <button key={k} className={`btn ${tab===k?'btn-primary':''}`} onClick={()=>setTab(k)}>{l}</button>
        ))}
      </div>
      {tab==='customers'&&(
        <div className="card">
          <div className="card-title">客戶管理</div>
          <div className="form-grid g4" style={{marginBottom:10}}>
            <div><label>客戶名稱 *</label><input value={newC.name} onChange={e=>setNewC({...newC,name:e.target.value})} placeholder="必填"/></div>
            <div><label>聯絡人</label><input value={newC.contact} onChange={e=>setNewC({...newC,contact:e.target.value})}/></div>
            <div><label>電話</label><input value={newC.phone} onChange={e=>setNewC({...newC,phone:e.target.value})}/></div>
            <div><label>送貨地址</label><input value={newC.address} onChange={e=>setNewC({...newC,address:e.target.value})}/></div>
          </div>
          <button className="btn btn-primary btn-sm" style={{marginBottom:12}} onClick={addCust}>＋ 新增客戶</button>
          <div style={{overflowX:'auto'}}>
            <table className="data">
              <thead><tr><th>名稱</th><th>聯絡人</th><th>電話</th><th>地址</th><th></th></tr></thead>
              <tbody>{customers.map(c=>(
                <tr key={c.id}>
                  {editId===c.id?(
                    <>
                      <td><input value={editData.name} onChange={e=>setEditData({...editData,name:e.target.value})} style={{width:'100%'}}/></td>
                      <td><input value={editData.contact} onChange={e=>setEditData({...editData,contact:e.target.value})} style={{width:'100%'}}/></td>
                      <td><input value={editData.phone} onChange={e=>setEditData({...editData,phone:e.target.value})} style={{width:'100%'}}/></td>
                      <td><input value={editData.address} onChange={e=>setEditData({...editData,address:e.target.value})} style={{width:'100%'}}/></td>
                      <td style={{whiteSpace:'nowrap'}}>
                        <button className="btn btn-primary btn-sm" style={{marginRight:4}} onClick={()=>saveEdit(c.id)}>儲存</button>
                        <button className="btn btn-sm" onClick={()=>setEditId(null)}>取消</button>
                      </td>
                    </>
                  ):(
                    <>
                      <td style={{fontWeight:500}}>{c.name}</td><td>{c.contact}</td><td>{c.phone}</td>
                      <td style={{fontSize:11,color:'#666'}}>{c.address}</td>
                      <td style={{whiteSpace:'nowrap'}}>
                        <button className="btn btn-sm" style={{marginRight:4}} onClick={()=>startEdit(c)}>編輯</button>
                        <button className="btn btn-danger btn-sm" onClick={()=>delCust(c.id)}>刪除</button>
                      </td>
                    </>
                  )}
                </tr>
              ))}</tbody>
            </table>
          </div>
        </div>
      )}
      {tab==='prices'&&(
        <div className="card">
          <div className="card-title">門檻價格設定（NT$/cm/條）</div>
          <div className="print-hint">💡 新增銷貨單時系統自動帶入此表的客戶售價</div>
          <div style={{overflowX:'auto'}}>
            <table className="data">
              <thead><tr><th>客戶名稱</th>{priceCols.map(c=><th key={c} style={{textAlign:'center'}}>{c}</th>)}</tr></thead>
              <tbody>{customers.map(c=>(
                <tr key={c.id}>
                  <td style={{fontWeight:500,whiteSpace:'nowrap'}}>{c.name}</td>
                  {priceCols.map(cat=>(
                    <td key={cat} style={{padding:'4px 6px'}}>
                      <input type="number" step="0.1" style={{width:60,textAlign:'center'}}
                        value={(prices[c.name]||STD)[cat]||''}
                        onChange={e=>updPrice(c.name,cat,e.target.value)}/>
                    </td>
                  ))}
                </tr>
              ))}</tbody>
            </table>
          </div>
        </div>
      )}
      {tab==='products'&&(
        <div className="card">
          <div className="card-title">產品管理</div>
          <div className="print-hint">💡 新增產品後自動同步到銷貨單下拉選單；成本價用於月銷售報表毛利計算</div>
          <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'center'}}>
            <input placeholder="輸入產品名稱" style={{width:200}} value={newProdName} onChange={e=>setNewProdName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addProd()}/>
            <button className="btn btn-primary" onClick={addProd}>＋ 新增</button>
          </div>
          <table className="data" style={{maxWidth:480}}>
            <thead><tr><th>產品名稱</th><th>成本價（NT$/cm）</th><th>操作</th></tr></thead>
            <tbody>
              {products.map(p=>(
                <tr key={p.id}>
                  <td style={{fontWeight:500}}>{p.name}</td>
                  <td style={{padding:'5px 10px'}}>
                    <input type="number" step="0.1" style={{width:100}} value={costs[p.name]||''} onChange={e=>updCost(p.name,e.target.value)}/>
                  </td>
                  <td><button className="btn btn-sm btn-danger" onClick={()=>delProd(p.id)}>刪除</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
      {tab==='password'&&(
        <div className="card" style={{maxWidth:420}}>
          <div className="card-title">🔒 密碼設定</div>
          <PasswordTab onLogout={onLogout}/>
        </div>
      )}
    </div>
  );
}

function PasswordTab({onLogout}){
  const[oldPw,setOldPw]=useState('');
  const[newPw,setNewPw]=useState('');
  const[confirmPw,setConfirmPw]=useState('');
  const[msg,setMsg]=useState('');
  const[isErr,setIsErr]=useState(false);
  const save=async()=>{
    const stored=await DB.load('yl-password','0000');
    if(oldPw!==stored){setMsg('舊密碼錯誤');setIsErr(true);return;}
    if(!newPw){setMsg('新密碼不能為空');setIsErr(true);return;}
    if(newPw!==confirmPw){setMsg('新密碼與確認密碼不符');setIsErr(true);return;}
    DB.save('yl-password',newPw);
    setOldPw('');setNewPw('');setConfirmPw('');
    setMsg('密碼已更新成功');setIsErr(false);
  };
  return(
    <div>
      <div style={{marginBottom:10}}><label>舊密碼</label><input type="password" value={oldPw} onChange={e=>{setOldPw(e.target.value);setMsg('');}} style={{maxWidth:240}}/></div>
      <div style={{marginBottom:10}}><label>新密碼</label><input type="password" value={newPw} onChange={e=>{setNewPw(e.target.value);setMsg('');}} style={{maxWidth:240}}/></div>
      <div style={{marginBottom:14}}><label>確認新密碼</label><input type="password" value={confirmPw} onChange={e=>{setConfirmPw(e.target.value);setMsg('');}} style={{maxWidth:240}}/></div>
      {msg&&<div style={{marginBottom:10,fontSize:13,color:isErr?'#c0392b':'#27ae60'}}>{msg}</div>}
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        <button className="btn btn-primary" onClick={save}>更新密碼</button>
        <button className="btn" style={{color:'#c0392b'}} onClick={onLogout}>登出</button>
      </div>
      <div style={{marginTop:14,fontSize:12,color:'#999'}}>預設密碼：0000</div>
    </div>
  );
}

/* ===== MAIN APP ===== */
function App(){
  const[loaded,setLoaded]=useState(false);
  const[tab,setTab]=useState('orders');
  const[orders,setOrders]=useState([]);
  const[customers,setCustomers]=useState(INIT_C);
  const[prices,setPrices]=useState(INIT_P);
  const[costs,setCosts]=useState(INIT_COSTS);
  const[products,setProducts]=useState(INIT_PRODS);
  const[receivables,setReceivables]=useState({});
  const[purchases,setPurchases]=useState([]);
  const[loggedIn,setLoggedIn]=useState(false);
  const[loginPw,setLoginPw]=useState('');const[loginErr,setLoginErr]=useState('');
  const[showNew,setShowNew]=useState(false);
  const[editOrder,setEditOrder]=useState(null);
  const[filterCust,setFilterCust]=useState('');
  const[filterMonth,setFilterMonth]=useState('');
  const[sortDir,setSortDir]=useState('desc');
  const logout=()=>{setLoggedIn(false);setTab('orders');setLoginPw('');setLoginErr('');};
  const handleLogin=async()=>{const stored=await DB.load('yl-password','0000');if(loginPw===stored){setLoggedIn(true);setLoginErr('');}else{setLoginErr('密碼錯誤，請重試');setLoginPw('');}};

  const PROTECTED_TABS=['purchase','statement','monthly','receivables','settings'];
  const ALL_TABS=[['orders','📋 銷貨單管理'],['purchase','📦 訂購單管理'],['statement','📊 對帳單'],['monthly','📈 月銷售報表'],['receivables','💰 應收帳款'],['settings','⚙️ 設定']];
  const visibleTabs=loggedIn?ALL_TABS:[['orders','📋 銷貨單管理']];

  useEffect(()=>{
    (async()=>{
      const o=await DB.load('yl-orders-v4',INIT_ORDERS);
      const c=await DB.load('yl-customers-v4',INIT_C);
      const p=await DB.load('yl-prices-v2',INIT_P);
      const cc=await DB.load('yl-costs',INIT_COSTS);
      const pp=await DB.load('yl-products',INIT_PRODS);
      const rv=await DB.load('yl-receivables',{});
      const pu=await DB.load('yl-purchases',INIT_PURCHASES);
      setOrders(o);setCustomers(c);setPrices(p);setCosts(cc);setProducts(pp);setReceivables(rv);setPurchases(pu);setLoaded(true);
    })();
  },[]);

  const saveOrder=order=>{
    const u=[order,...orders];setOrders(u);DB.save('yl-orders-v4',u);
  };
  const updateOrder=order=>{
    const u=orders.map(o=>o.id===order.id?order:o);setOrders(u);DB.save('yl-orders-v4',u);
  };
  const delOrder=id=>{
    if(!confirm('確定刪除此銷貨單？'))return;
    const u=orders.filter(o=>o.id!==id);setOrders(u);DB.save('yl-orders-v4',u);
  };
  const handleExport=(order,cust,showPrices,fmt)=>{
    if(fmt==='xlsx')exportXLSX(order,cust,showPrices);
    else exportHTML(order,cust,showPrices);
  };

  const months=[...new Set(orders.map(o=>toROCM(o.date)))].sort().reverse();
  const filtOrders=orders.filter(o=>(!filterCust||o.customerId===filterCust)&&(!filterMonth||toROCM(o.date)===filterMonth)).sort((a,b)=>sortDir==='desc'?b.date.localeCompare(a.date):a.date.localeCompare(b.date));
  const totalRev=orders.reduce((s,o)=>s+(o.total||0),0);
  const thisM=toROCM(today());
  const thisMOrders=orders.filter(o=>toROCM(o.date)===thisM);
  const thisMRev=thisMOrders.reduce((s,o)=>s+(o.total||0),0);

  if(!loaded)return<div style={{textAlign:'center',padding:80,color:'#999'}}>載入中...</div>;

  return(
    <div id="root">
      <div className="navbar">
        <div>
          <div className="navbar-brand">⚡ 勇龍有限公司 銷貨管理系統</div>
          <div className="navbar-sub">YEONG LONG Ltd — Sales Management System</div>
        </div>
        {loggedIn&&<button className="btn" style={{color:'#f5d98a',borderColor:'rgba(245,217,138,0.4)'}} onClick={logout}>🔓 登出</button>}
      </div>
      {!loggedIn&&(
        <div style={{padding:'16px 16px 0'}}>
          <div className="card" style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap',justifyContent:'space-between',padding:'12px 16px'}}>
            <div style={{fontWeight:600,fontSize:14}}>🔒 請登入以使用完整功能</div>
            <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
              <input type="password" value={loginPw} onChange={e=>{setLoginPw(e.target.value);setLoginErr('');}} onKeyDown={e=>e.key==='Enter'&&handleLogin()} autoFocus placeholder="請輸入密碼" style={{maxWidth:160}}/>
              <button className="btn btn-primary" onClick={handleLogin}>🔓 登入</button>
              {loginErr&&<span style={{color:'#c0392b',fontSize:12}}>{loginErr}</span>}
            </div>
          </div>
        </div>
      )}
      <div className="nav-tabs">
        {visibleTabs.map(([k,l])=>(
          <button key={k} className={`nav-tab ${tab===k?'active':''}`} onClick={()=>setTab(k)}>{l}</button>
        ))}
      </div>
      <div className="content">
        {tab==='orders'&&(
          <div>
            <div className="stat-grid">
              <div className="stat-card"><div className="stat-val">{orders.length}</div><div className="stat-lbl">總銷貨單數</div></div>
              <div className="stat-card"><div className="stat-val">{thisMOrders.length}</div><div className="stat-lbl">本月銷貨單數</div></div>
              <div className="stat-card"><div className="stat-val" style={{color:'#c9a84c',fontSize:17}}>{loggedIn?`NT$ ${fmtN(thisMRev)}`:'$$$$$'}</div><div className="stat-lbl">本月銷售金額</div></div>
              <div className="stat-card"><div className="stat-val" style={{color:'#1a2744',fontSize:17}}>{loggedIn?`NT$ ${fmtN(totalRev)}`:'$$$$$'}</div><div className="stat-lbl">累計銷售金額</div></div>
            </div>
            <div className="card">
              <div style={{display:'flex',gap:10,marginBottom:12,alignItems:'flex-end',flexWrap:'wrap'}}>
                <div><label>篩選客戶</label>
                  <select value={filterCust} onChange={e=>setFilterCust(e.target.value)} style={{width:140}}>
                    <option value="">全部客戶</option>
                    {customers.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                  </select>
                </div>
                <div><label>篩選月份</label>
                  <select value={filterMonth} onChange={e=>setFilterMonth(e.target.value)} style={{width:120}}>
                    <option value="">全部月份</option>
                    {months.map(m=><option key={m} value={m}>{m}</option>)}
                  </select>
                </div>
                <div><label>日期排序</label>
                  <button className="btn" style={{alignSelf:'flex-end'}} onClick={()=>setSortDir(d=>d==='desc'?'asc':'desc')}>
                    {sortDir==='desc'?'↓ 最新在前':'↑ 最舊在前'}
                  </button>
                </div>
                {loggedIn&&<button className="btn btn-primary" style={{alignSelf:'flex-end'}} onClick={()=>setShowNew(true)}>＋ 新增銷貨單</button>}
                <div style={{marginLeft:'auto',fontSize:12,color:'#999',alignSelf:'flex-end'}}>共 {filtOrders.length} 筆</div>
              </div>
              {filtOrders.length>0?(
                <div style={{overflowX:'auto'}}>
                  <table className="data">
                    <thead><tr><th>銷貨單號</th><th>客戶名稱</th><th>日期</th><th>項目數</th><th>金額（NT$）</th><th>操作</th></tr></thead>
                    <tbody>{filtOrders.map(o=><OrderRow key={o.id} order={o} customers={customers} onDelete={delOrder} onExport={handleExport} onEdit={setEditOrder} canManage={loggedIn}/>)}</tbody>
                  </table>
                </div>
              ):(
                <div className="empty">
                  <div style={{fontSize:40,marginBottom:10}}>📋</div>
                  <div style={{fontSize:15,marginBottom:6}}>尚無銷貨單記錄</div>
                  {loggedIn&&<button className="btn btn-primary" style={{marginTop:8}} onClick={()=>setShowNew(true)}>＋ 新增第一筆銷貨單</button>}
                </div>
              )}
            </div>
          </div>
        )}
        {tab==='purchase'&&<PurchaseView purchases={purchases} setPurchases={setPurchases}/>}
        {tab==='statement'&&<StatementView orders={orders} customers={customers} prices={prices}/>}
        {tab==='monthly'&&<MonthlyReport orders={orders} customers={customers} costs={costs} purchases={purchases}/>}
        {tab==='receivables'&&<ReceivablesView orders={orders} customers={customers} receivables={receivables} setReceivables={setReceivables}/>}
        {tab==='settings'&&<SettingsView customers={customers} setCustomers={setCustomers} prices={prices} setPrices={setPrices} costs={costs} setCosts={setCosts} products={products} setProducts={setProducts} onLogout={logout}/>}
      </div>
      {showNew&&<NewOrderModal customers={customers} prices={prices} products={products} onSave={saveOrder} onClose={()=>setShowNew(false)}/>}
      {editOrder&&<EditOrderModal order={editOrder} customers={customers} prices={prices} products={products} onUpdate={updateOrder} onClose={()=>setEditOrder(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
